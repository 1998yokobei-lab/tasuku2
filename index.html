<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>God morgon</title>
    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <style>
        :root {
            --ikea-blue: #0058AB;
            --ikea-yellow: #FFCC00;
            --snow-white: #FFFFFF;
            --dark-gray: #333333;
            --border-light: #EEEEEE;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: -apple-system, sans-serif;
            background: var(--snow-white);
            color: var(--dark-gray);
            overflow-x: hidden;
        }

        /* 1. オープニング演出 */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--snow-white);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease-in-out;
        }

        .splash-text {
            font-size: 28px;
            font-weight: 700;
            opacity: 0;
            transform: translateY(10px);
            animation: sunrise 2.5s forwards;
        }

        @keyframes sunrise {
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-5px); }
        }

        /* メイン画面 */
        main {
            padding: 60px 24px;
            max-width: 500px;
            margin: 0 auto;
            opacity: 0;
            transition: opacity 0.5s;
        }

        h1 { font-size: 32px; font-weight: 800; color: var(--ikea-blue); margin-bottom: 24px; }

        /* タスク追加 UI */
        .input-group {
            display: flex; gap: 10px; margin-bottom: 32px;
        }

        input[type="text"] {
            flex: 1; border: 2px solid var(--border-light); border-radius: 12px;
            padding: 16px; font-size: 16px; font-weight: 600; outline: none;
        }

        #add-btn {
            background: var(--ikea-blue); color: white; border: none;
            border-radius: 12px; padding: 0 20px; font-weight: 700; cursor: pointer;
        }

        /* リスト UI */
        .todo-item {
            display: flex; align-items: center; padding: 18px;
            border: 1px solid var(--border-light); border-radius: 14px; margin-bottom: 12px;
            transition: 0.3s;
        }

        .checkbox {
            width: 30px; height: 30px; border: 2px solid var(--ikea-blue);
            border-radius: 10px; margin-right: 16px; display: flex;
            justify-content: center; align-items: center; font-weight: bold;
        }

        .completed { background: #FAFAFA; border-color: transparent; }
        .completed .checkbox { background: var(--ikea-yellow); border-color: var(--ikea-yellow); }
        .completed .text { text-decoration: line-through; opacity: 0.4; }

        .delete-btn { color: #CCC; margin-left: auto; padding: 5px; font-size: 18px; }

        /* ご褒美演出 */
        #reward {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: var(--ikea-blue); color: white; padding: 18px 30px;
            border-radius: 40px; font-weight: bold; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            white-space: nowrap; z-index: 500;
        }
        #reward.show { bottom: 40px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-text">おはようございます!</div>
    </div>

    <main id="main-content">
        <h1>Routine</h1>
        
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="新しい習慣を追加..." maxlength="20">
            <button id="add-btn">追加</button>
        </div>

        <div id="todo-list"></div>
    </main>

    <div id="reward">🔓　今日も素晴らしい1日を！</div>

    <script>
        const storageKey = 'morning_routine_v4';
        let todos = JSON.parse(localStorage.getItem(storageKey)) || [
            { text: '朝日を浴びる', done: false },
            { text: '水を飲む', done: false }
        ];

        const splash = document.getElementById('splash-screen');
        const main = document.getElementById('main-content');
        const input = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const listContainer = document.getElementById('todo-list');
        const reward = document.getElementById('reward');

        // 起動時演出
        window.onload = () => {
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    main.style.opacity = '1';
                }, 800);
            }, 2500);
            render();
        };

        function haptic(type = 'light') {
            if (navigator.vibrate) navigator.vibrate(type === 'heavy' ? [30, 50, 30] : 15);
        }

        function render() {
            listContainer.innerHTML = '';
            const allDone = todos.length > 0 && todos.every(t => t.done);

            // ロック状態をハッシュに書き込む（iPhoneショートカット連携用）
            window.location.hash = allDone ? "all_cleared" : "locked";

            // ご褒美アニメーション
            if (allDone) {
                reward.classList.add('show');
            } else {
                reward.classList.remove('show');
            }

            todos.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = `todo-item ${t.done ? 'completed' : ''}`;
                item.innerHTML = `
                    <div class="checkbox" onclick="toggle(${i})">${t.done ? '✓' : ''}</div>
                    <div class="text" style="flex:1; font-weight:700;" onclick="toggle(${i})">${t.text}</div>
                    <div class="delete-btn" onclick="del(${i})">×</div>
                `;
                listContainer.appendChild(item);
            });
            localStorage.setItem(storageKey, JSON.stringify(todos));
        }

        function toggle(i) {
            todos[i].done = !todos[i].done;
            if (todos[i].done) haptic('light');
            if (todos.length > 0 && todos.every(t => t.done)) haptic('heavy');
            render();
        }

        function del(i) {
            todos.splice(i, 1);
            render();
        }

        addBtn.onclick = () => {
            const val = input.value.trim();
            if (val) {
                todos.push({ text: val, done: false });
                input.value = '';
                render();
            }
        };

        input.onkeypress = (e) => { if (e.key === 'Enter') addBtn.onclick(); };
    </script>
</body>
</html>
