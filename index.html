<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskForce Stadium</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #001d42; --card: #ffffff; --blue: #007aff; --red: #ff3b30; --green: #34c759; --text: #1c1c1e; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .streak-badge { background: linear-gradient(45deg, #ff9500, #ff5e3a); color: white; border-radius: 50px; padding: 5px 15px; font-size: 14px; font-weight: 800; display: inline-block; margin-bottom: 10px; }
        .timer-card { background: rgba(255,255,255,0.1); color: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .timer-display { font-size: 40px; font-weight: 800; }
        .card { background: var(--card); border-radius: 24px; padding: 24px; margin-bottom: 20px; text-align: center; }
        .btn { display: flex; align-items: center; justify-content: center; height: 65px; border-radius: 18px; font-size: 19px; font-weight: 700; text-decoration: none; margin-bottom: 15px; border: none; width: 100%; }
        .btn-red { background: var(--red); color: white; }
        .btn-green { background: var(--green); color: white; }
        .task-item { display: flex; align-items: center; text-align: left; padding: 10px 0; border-bottom: 1px solid #eee; }
        input[type="checkbox"] { width: 20px; height: 20px; margin-right: 10px; }
        .task-input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div style="text-align: center; margin-top: 20px;">
        <div id="streak-container" class="streak-badge">🔥 0日連続達成中</div>
    </div>

    <div class="timer-card">
        <div class="timer-display" id="countdown">00:00:00</div>
        <div style="margin-top:10px;"><input type="time" id="targetTimeInput" onchange="saveTargetTime()"></div>
    </div>

    <div class="card">
        <input type="text" id="newTask" class="task-input" placeholder="やることを入力...">
        <button onclick="addTask()" style="margin-bottom:20px; width: 100%; padding: 10px; border-radius: 10px; background: var(--blue); color: white; border: none; font-weight: bold;">追加</button>
        <div id="taskList"></div>
        <hr style="margin: 20px 0; opacity: 0.2;">
        
        <a href="shortcuts://x-callback-url/run-shortcut?name=ロック開始&x-success=https://1998yokobei-lab.github.io/tasuku2/" class="btn btn-red">集中モード開始</a>
        <button id="compBtn" class="btn btn-green" onclick="completeTask()" disabled>タスク完了＆解除</button>
        <div id="msg"></div>
    </div>

    <script>
        const MY_URL = "https://1998yokobei-lab.github.io/tasuku2/";
        let tasks = JSON.parse(localStorage.getItem('myTasks2')) || [];
        let streak = parseInt(localStorage.getItem('myStreak2')) || 0;
        let count = parseInt(localStorage.getItem('myCount2')) || 0;
        let targetTime = localStorage.getItem('targetTime2') || "22:00";
        document.getElementById('targetTimeInput').value = targetTime;

        function saveTargetTime() {
            localStorage.setItem('targetTime2', document.getElementById('targetTimeInput').value);
        }

        function addTask() {
            const val = document.getElementById('newTask').value;
            if(!val) return;
            tasks.push({text: val, done: false});
            document.getElementById('newTask').value = "";
            render();
        }

        function render() {
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            let allDone = tasks.length > 0;
            tasks.forEach((t, i) => {
                if(!t.done) allDone = false;
                const div = document.createElement('div');
                div.className = "task-item";
                div.innerHTML = `<input type="checkbox" ${t.done?'checked':''} onchange="tasks[${i}].done=!tasks[${i}].done;render()"> ${t.text}`;
                list.appendChild(div);
            });
            document.getElementById('compBtn').disabled = !allDone;
            localStorage.setItem('myTasks2', JSON.stringify(tasks));
        }

        function completeTask() {
            tasks = [];
            render();
            // 解除もtasuku2に固定
            const encodedUrl = encodeURIComponent(MY_URL);
            window.location.href = `shortcuts://x-callback-url/run-shortcut?name=ロック解除&x-success=${encodedUrl}`;
        }

        setInterval(() => {
            const now = new Date();
            const [h, m] = document.getElementById('targetTimeInput').value.split(':');
            let target = new Date(); target.setHours(h, m, 0, 0);
            if (now > target) target.setDate(target.getDate() + 1);
            const diff = target - now;
            const hh = Math.floor(diff/3600000).toString().padStart(2,'0');
            const mm = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
            const ss = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            document.getElementById('countdown').innerText = `${hh}:${mm}:${ss}`;
            document.getElementById('streak-container').innerText = `🔥 ${streak}日連続達成中`;
        }, 1000);

        render();
    </script>
</body>
</html>
